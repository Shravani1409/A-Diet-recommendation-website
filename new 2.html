<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personalized Diet Plan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }
    select, button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    #dietPlans {
      margin-top: 20px;
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 5px;
      background-color: #f9f9f9;
    }
  </style>
</head>
<body>
  <h1>Personalized Diet Plan</h1>
  <div class="container">
    <div class="form-group">
      <label for="goal">What's your goal?</label>
      <select id="goal">
        <option value="weightLoss">Weight Loss</option>
        <option value="weightGain">Weight Gain</option>
        <option value="diabetes">Diabetes Control</option>
      </select>
    </div>
    <div class="form-group">
      <label for="activity">What's your activity level?</label>
      <select id="activity">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="form-group">
      <label for="food">What's your food preference?</label>
      <select id="food">
        <option value="veg">Vegetarian</option>
        <option value="nonVeg">Non-Vegetarian</option>
        <option value="vegan">Vegan</option>
      </select>
    </div>
    <button id="getPlanBtn">Get My Diet Plan</button>
    <div id="dietPlans"></div>
  </div>

  <script>
    const getPlanBtn = document.getElementById("getPlanBtn");
    const plansContainer = document.getElementById("dietPlans");
    const goalSelect = document.getElementById("goal");
    const activitySelect = document.getElementById("activity");
    const foodSelect = document.getElementById("food");

    const plans = {
      weightLoss: {
        low: {
          veg: "Weight Loss, Low Activity, Veg Plan: Eat small frequent meals, oats for breakfast, lentil soup for lunch, and salad for dinner.",
          nonVeg: "Weight Loss, Low Activity, Non-Veg Plan: Start with eggs, lean chicken for lunch, and fish with salad for dinner.",
          vegan: "Weight Loss, Low Activity, Vegan Plan: Smoothies, quinoa, and vegetable stir fry."
        },
        medium: {
          veg: "Weight Loss, Medium Activity, Veg Plan: Add fruits and dry fruits to your meals, ensure sufficient protein with paneer and tofu.",
          nonVeg: "Weight Loss, Medium Activity, Non-Veg Plan: Boiled eggs, grilled chicken, and leafy greens.",
          vegan: "Weight Loss, Medium Activity, Vegan Plan: Whole grains, soy milk, legumes, and green smoothies."
        },
        high: {
          veg: "Weight Loss, High Activity, Veg Plan: High protein meals with tofu, lentils, and balanced carbs.",
          nonVeg: "Weight Loss, High Activity, Non-Veg Plan: Egg whites, grilled fish, and lean meats.",
          vegan: "Weight Loss, High Activity, Vegan Plan: Nuts, seeds, lentils, and complex carbs."
        }
      },
      weightGain: {
        low: {
          veg: "Weight Gain, Low Activity, Veg Plan: Add ghee, full-fat milk, and bananas to your diet.",
          nonVeg: "Weight Gain, Low Activity, Non-Veg Plan: Eggs, meats, and dairy products are good.",
          vegan: "Weight Gain, Low Activity, Vegan Plan: Nuts, seeds, coconut milk, and avocado."
        },
        medium: {
          veg: "Weight Gain, Medium Activity, Veg Plan: Dairy, nuts, whole grains, and legumes.",
          nonVeg: "Weight Gain, Medium Activity, Non-Veg Plan: Chicken, eggs, cheese, and potatoes.",
          vegan: "Weight Gain, Medium Activity, Vegan Plan: Protein shakes, nut butters, and fruits."
        },
        high: {
          veg: "Weight Gain, High Activity, Veg Plan: Paneer, rice, sweet potatoes, and dry fruits.",
          nonVeg: "Weight Gain, High Activity, Non-Veg Plan: Red meats, eggs, and high-calorie meals.",
          vegan: "Weight Gain, High Activity, Vegan Plan: Energy bars, oats, dates, and smoothies."
        }
      },
      diabetes: {
        low: {
          veg: "Diabetes, Low Activity, Veg Plan: High fiber vegetables, whole grains, and legumes.",
          nonVeg: "Diabetes, Low Activity, Non-Veg Plan: Lean chicken, eggs, and green vegetables.",
          vegan: "Diabetes, Low Activity, Vegan Plan: Leafy greens, whole grains, and seeds."
        },
        medium: {
          veg: "Diabetes, Medium Activity, Veg Plan: Balanced diet with fruits, legumes, and low GI foods.",
          nonVeg: "Diabetes, Medium Activity, Non-Veg Plan: Grilled meat, salad, and oats.",
          vegan: "Diabetes, Medium Activity, Vegan Plan: Chia seeds, barley, and non-starchy vegetables."
        },
        high: {
          veg: "Diabetes, High Activity, Veg Plan: Protein-rich lentils, greens, and complex carbs.",
          nonVeg: "Diabetes, High Activity, Non-Veg Plan: Fish, egg whites, and multigrain chapati.",
          vegan: "Diabetes, High Activity, Vegan Plan: High fiber whole grains, sprouts, and smoothies."
        }
      }
    };

    getPlanBtn.addEventListener("click", function () {
      const goal = goalSelect.value;
      const activity = activitySelect.value;
      const food = foodSelect.value;

      plansContainer.innerHTML = "";
      const selectedPlan = plans[goal]?.[activity]?.[food];

      if (selectedPlan) {
        plansContainer.innerHTML = selectedPlan;

        fetch('save_diet_plan.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            goal: goal,
            activity: activity,
            food: food,
            plan: selectedPlan
          })
        })
        .then(response => response.text())
        .then(data => {
          console.log('Diet plan saved:', data);
        })
        .catch(error => {
          console.error('Error saving diet plan:', error);
        });

      } else {
        plansContainer.innerHTML = "<p>No plan found for the selected combination. Please try again.</p>";
      }
    });
  </script>
</body>
</html>
